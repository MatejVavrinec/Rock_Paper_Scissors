<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock,paper,scissors</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="uprava.css">       
</head>

<body>
<div class="game">

<h1>Rock Paper Scissors</h1>

<div class="mode">
<h2>Game Mode</h2>

<button id="vs-computer">Player vs Computer</button>

</div>


<div class="scoreboard">

<div class="player-score">
<h3>Player 1</h3>
<p id="score1">0</p>
</div>

<div class="player-score">
<h3>Computer</h3>
<p id="score2">0</p>
</div>

</div>

<div class="choices">

<button class="choice" id="rock">
    <img src="kamen.avif" width="80">    
</button>
<button class="choice" id="paper">
    <img class="obrazok" src="paper.jpg" width="80">
</button>
<button class="choice" id="scissors">
    <img src="noznice.avif" width="80">
</button>

</div>


<div class="result">

<p>Player 1 chose: <span id="p1-choice">-</span></p>
<p>Computer chose: <span id="p2-choice">-</span></p>

<h2 id="winner">Choose your move</h2>

</div>

<div class="controls">

</div>


<div class="controls">

<button id="restart">Restart Game</button>

</div>

</div>
